<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nosso Wrapped 2026</title>
    <style>
        :root {
            --bg-deep: #120a1a;        /* Roxo quase preto */
            --lilac: #b388ff;          /* Lilás principal */
            --spotify-green: #1ed760;  /* Verde destaque */
            --gold: #ffd700;           /* Ouro contraste */
            --white: #ffffff;
            --card-bg: rgba(49, 27, 71, 0.7);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Circular', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--white);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- FUNDO ANIMADO --- */
        #bgCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        .container {
            position: relative; z-index: 1; width: 100%; height: 100%;
            max-width: 450px; /* Proporção de celular */
        }

        /* --- SLIDES --- */
        .slide {
            display: none; position: absolute; width: 100%; height: 100%;
            padding: 30px; box-sizing: border-box;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .active { display: flex; animation: slideIn 0.8s ease forwards; }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- TEXTOS --- */
        h1 { font-size: 3rem; font-weight: 900; margin: 0; line-height: 1; text-transform: uppercase; }
        .lilac-text { color: var(--lilac); }
        .green-text { color: var(--spotify-green); }
        p { font-size: 1.2rem; margin: 15px 0; opacity: 0.9; }

        /* --- MOLDURA DO "VÍDEO" INFINITO --- */
        .video-loop {
            width: 100%;
            aspect-ratio: 1/1; /* Quadrado tipo capa de álbum */
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 4px solid var(--lilac);
            box-shadow: 0 0 30px rgba(179, 136, 255, 0.4);
            margin-bottom: 20px;
        }

        .video-loop img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: infiniteFade 16s infinite; /* 4s para cada uma das 4 fotos */
        }

        /* Lógica do looping das fotos */
        .video-loop img:nth-child(1) { animation-delay: 0s; }
        .video-loop img:nth-child(2) { animation-delay: 4s; }
        .video-loop img:nth-child(3) { animation-delay: 8s; }
        .video-loop img:nth-child(4) { animation-delay: 12s; }

        @keyframes infiniteFade {
            0% { opacity: 0; transform: scale(1); }
            5% { opacity: 1; }
            25% { opacity: 1; }
            30% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; }
        }

        /* --- CONTADOR --- */
        .counter-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%;
        }
        .counter-box {
            background: var(--card-bg);
            padding: 10px; border-radius: 12px;
            border: 1px solid rgba(179, 136, 255, 0.2);
        }
        .val { display: block; font-size: 1.4rem; font-weight: bold; color: var(--gold); }
        .lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--lilac); }

        /* --- BOTÃO --- */
        .btn {
            background: var(--lilac); color: var(--bg-deep);
            border: none; padding: 18px 45px; border-radius: 50px;
            font-weight: bold; font-size: 1rem; cursor: pointer;
            margin-top: 30px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { transform: scale(1.05); background: var(--white); }

        /* --- FOTO ARTISTA --- */
        .artist-photo {
            width: 180px; height: 180px; border-radius: 50%;
            border: 6px solid var(--gold); object-fit: cover;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <audio id="musica" loop>
        <source src="Iframe Coldplay - Sparks [Ar48yzjn1PE].mp3" type="audio/mpeg">
    </audio>

    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <div class="slide active" id="s1">
            <h1 class="lilac-text">Sua</h1>
            <h1>Retrospectiva</h1>
            <p>2 anos de uma história incrível.</p>
            <button class="btn" onclick="iniciar()">Ver meu presente 💜</button>
        </div>

        <div class="slide" id="s2">
            <p>Você foi o "hit" mais ouvido de todos os tempos.</p>
            <h1 class="green-text" style="font-size: 4rem;">100%</h1>
            <p>do meu tempo foi pensando em você.</p>
            <button class="btn" onclick="ir(3)">E a Artista nº 1?</button>
        </div>

        <div class="slide" id="s3">
            <img src="4-ca1125ce.jpg" class="artist-photo" alt="Ela">
            <h2 class="lilac-text">Minha Artista Favorita</h2>
            <p>Você passou <span class="green-text">1.051.200</span> minutos no topo das minhas paradas.</p>
            <button class="btn" onclick="ir(4)">Ver nossa história ✨</button>
        </div>

        <div class="slide" id="s4">
            <div class="video-loop">
                <img src="foto1.jpg">
                <img src="foto2.jpg">
                <img src="foto3.jpg">
                <img src="foto4.jpg">              
            </div>
            
            <div class="counter-grid">
                <div class="counter-box"><span class="val" id="y">0</span><span class="lab">Anos</span></div>
                <div class="counter-box"><span class="val" id="m">0</span><span class="lab">Meses</span></div>
                <div class="counter-box"><span class="val" id="d">0</span><span class="lab">Dias</span></div>
                <div class="counter-box"><span class="val" id="h">0</span><span class="lab">Hrs</span></div>
                <div class="counter-box"><span class="val" id="min">0</span><span class="lab">Min</span></div>
                <div class="counter-box"><span class="val" id="sec">0</span><span class="lab">Seg</span></div>
            </div>
            
            <p style="font-size: 0.8rem; margin-top: 15px;">Desde 07/03/2024 • Amo você!</p>
            <button class="btn" style="padding: 10px 20px; font-size: 0.7rem;" onclick="ir(1)">Recomeçar ↻</button>
        </div>
    </div>

    <script>
        // --- FUNÇÕES DE NAVEGAÇÃO ---
        function iniciar() {
            document.getElementById('musica').play();
            ir(2);
        }

        function ir(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + n).classList.add('active');
        }

        // --- CONTADOR REALTIME ---
        const start = new Date('2024-03-07T00:00:00');
        function update() {
            const now = new Date();
            const diff = now - start;

            let years = now.getFullYear() - start.getFullYear();
            let months = now.getMonth() - start.getMonth();
            let days = now.getDate() - start.getDate();

            if (days < 0) { months--; let last = new Date(now.getFullYear(), now.getMonth(), 0); days += last.getDate(); }
            if (months < 0) { years--; months += 12; }

            document.getElementById('y').innerText = years;
            document.getElementById('m').innerText = months;
            document.getElementById('d').innerText = days;
            document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById('min').innerText = Math.floor((diff / 60000) % 60);
            document.getElementById('sec').innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(update, 1000);

        // --- ANIMAÇÃO DE FUNDO ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Part {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 3 + 1;
                this.v = Math.random() * 0.5 + 0.2;
                this.c = Math.random() > 0.5 ? '#b388ff' : '#ffd700';
            }
            draw() {
                this.y += this.v;
                if (this.y > canvas.height) this.y = -10;
                ctx.fillStyle = this.c;
                ctx.globalAlpha = 0.4;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill();
            }
        }
        for(let i=0; i<50; i++) parts.push(new Part());
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p => p.draw()); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
